<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Knit Flower Bouquet Simulator | RILU</title>
  <style>
    :root {
      --bg: #d6f0ef;
      --accent: #2a9d96;
      --text: #222222;
      --light: #ffffff;
      --border: #a8d8d6;
      --green: #6a9e5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: var(--light);
      padding: 10px 16px 8px;
      border-bottom: 1.5px solid var(--border);
      text-align: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; color: var(--text); letter-spacing: 0.06em; }
    header p  { font-size: 0.7rem; color: #666; margin-top: 2px; }

    /* Bouquet */
    .bouquet-wrap {
      background: #fff;
      position: relative;
      height: 360px;
      flex-shrink: 0;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      touch-action: none;
    }
    #bouquet-svg { width: 100%; height: 100%; touch-action: none; }
    .empty-msg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #d0b8a8; font-size: 0.85rem; gap: 8px;
      pointer-events: none;
    }
    .empty-msg .ico { font-size: 2.5rem; }

    /* Selected bar */
    .selected-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; gap: 6px; align-items: center;
      min-height: 52px; flex-shrink: 0;
      overflow-x: auto;
    }
    .selected-bar::-webkit-scrollbar { display: none; }
    .sel-chip {
      display: flex; align-items: center; gap: 4px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 8px 3px 4px;
      font-size: 0.7rem; white-space: nowrap; flex-shrink: 0;
    }
    .sel-chip .dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .sel-chip .rm { margin-left:2px; font-size:0.8rem; color:#b09080; cursor:pointer; line-height:1; }
    .empty-bar { color:#888; font-size:0.75rem; }
    .clear-btn {
      margin-left: auto; background: none;
      border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 10px; font-size: 0.65rem;
      color: #b09080; cursor: pointer; flex-shrink: 0;
    }

    /* Picker */
    .picker-section { padding: 12px 12px 80px; flex: 1; overflow-y: auto; }
    .picker-section h2 { font-size: 0.75rem; color: #555; letter-spacing: 0.06em; margin-bottom: 10px; }
    .flower-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .flower-card {
      background: var(--light); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 8px 4px 6px;
      text-align: center; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
    }
    .flower-card:active { transform: scale(0.95); }
    .flower-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(192,117,106,0.2); }
    .flower-card .img-wrap { width:80px; height:100px; overflow:hidden; margin:0 auto; }
    .flower-card img { width:80px; height:100px; object-fit:contain; transform:scale(1.8); transform-origin:top center; }
    .flower-card[data-fid="suzuran"] img { transform:scale(1.5); }
    .flower-card[data-fid="koflower"] img { transform:scale(2.0); }
    .flower-card[data-fid="kasumisou"] img { transform:scale(2.0); }
    .flower-card[data-fid="snowwillow"] img { transform:scale(1.5); }
    .flower-card .f-svg { width:80px; height:100px; display:block; margin:0 auto; }
    .flower-card .f-name { font-size: 0.6rem; color: var(--text); margin-top:4px; line-height:1.3; }
    .flower-card .color-dots { display:flex; justify-content:center; gap:3px; margin-top:4px; flex-wrap:wrap; }
    .flower-card .cdot { width:7px; height:7px; border-radius:50%; border:1px solid rgba(0,0,0,0.1); }
    .count-badge {
      position:absolute; top:4px; right:4px;
      background:var(--accent); color:#fff;
      border-radius:50%; width:16px; height:16px;
      font-size:0.6rem; display:flex; align-items:center; justify-content:center;
    }

    /* Bottom Sheet */
    .sheet-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.4);
      z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    .sheet-overlay.open { opacity:1; pointer-events:auto; }
    .bottom-sheet {
      position:fixed; bottom:0; left:50%;
      transform:translateX(-50%) translateY(100%);
      width:100%; max-width:430px;
      background:#fff; border-radius:20px 20px 0 0;
      z-index:101; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-height:75vh; overflow-y:auto;
    }
    .bottom-sheet.open { transform:translateX(-50%) translateY(0); }
    .sheet-handle { width:36px; height:4px; background:#ddd; border-radius:2px; margin:10px auto 6px; }
    .sheet-header { padding:4px 16px 12px; border-bottom:1px solid var(--border); }
    .sheet-flower-name { font-size:1rem; font-weight:bold; color:var(--text); }
    .sheet-sub { font-size:0.7rem; color:#666; margin-top:2px; }
    .color-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px; }
    .color-option {
      border:2px solid var(--border); border-radius:12px;
      padding:8px 4px 6px; text-align:center; cursor:pointer;
      transition:border-color 0.15s;
    }
    .color-option:active { transform:scale(0.95); }
    .color-option.active { border-color:var(--accent); background:#fff5f3; }
    .color-option .img-wrap { width:80px; height:100px; overflow:hidden; margin:0 auto; }
    .color-option img { width:80px; height:100px; object-fit:contain; display:block; transform:scale(1.8); transform-origin:top center; }
    .color-option .c-svg { width:56px; height:76px; display:block; margin:0 auto; }
    .color-option .c-name { font-size:0.58rem; color:var(--text); margin-top:4px; line-height:1.3; }
    .sheet-add-btn {
      display:block; width:calc(100% - 28px);
      margin:0 14px 24px; padding:14px;
      background:var(--accent); color:#fff; border:none;
      border-radius:14px; font-size:0.95rem; font-weight:bold;
      cursor:pointer; letter-spacing:0.04em;
    }
    .sheet-add-btn:active { opacity:0.85; }
  </style>
</head>
<body>

<header>
  <h1>Bouquet Simulator</h1>
  <p>お花を選んでブーケを作ろう</p>
</header>

<div class="bouquet-wrap">
  <svg id="bouquet-svg" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="empty-msg" id="empty-msg">
    <span class="ico">💐</span>
    <span>下のリストからお花を選んでください</span>
  </div>
</div>

<div class="selected-bar" id="selected-bar">
  <span class="empty-bar">No flowers selected yet</span>
</div>

<div class="picker-section">
  <h2>— Choose Flowers —</h2>
  <div class="flower-grid" id="flower-grid"></div>
</div>

<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-flower-name" id="sheet-flower-name"></div>
    <div class="sheet-sub">Choose a color</div>
  </div>
  <div class="color-grid" id="color-grid"></div>
  <button class="sheet-add-btn" onclick="addFlower()">選択</button>
</div>

<script>
const BASE = 'https://riluflower.github.io/bouquet_simulator/';

const HEX = {
  'ホワイトセージ':'#e8ede5','ホワイトオリーブ':'#dde8d0',
  'カーマインレッド':'#9e1b32','ローズピンク':'#f48fb1',
  'ヒマワリ':'#ffd700','キャロット':'#ff7518',
  'ダスティブルー':'#8ba7c7','シトラス':'#f0e060',
  'ライラック':'#c8a0e0','レッド':'#cc2200',
  'ミルクホワイトセージ':'#e8ede5','イエロー':'#f5d020',
  'ライトイエロー':'#fdeea0','クリームイエロー':'#fae5a0',
  'アクア':'#60c8d0','アザミ':'#9e78b5',
  'コーラルピンク':'#f08080','ピンク':'#ff9cb0',
  'Gイエロー':'#ffd700','Gピンク':'#f48fb1','Gレッド':'#cc2200',
  'ライトピンク':'#ffb6c1','ライトブルー':'#add8e6',
  'セージ':'#7a9e7e','オリーブ':'#6b7c3e',
  'ベビーピンク':'#ffe4e8','ミルクホワイト':'#f5f0e8',
  'ホワイト':'#f0f0f0','パープル':'#9b59b6',
  'ベージュ':'#e8d5b0','マゼンタ':'#e040a0',
  'ライトアクア':'#a0e8e8','オレンジ':'#ff8c00',
};

function u(name, color) {
  return BASE + encodeURIComponent((name + '_' + color + '.png').normalize('NFD'));
}

const FLOWERS = [
  { id:'margaret',      name:'マーガレット',       type:'daisy',
    colors:[{n:'ホワイトセージ',h:1}] },
  { id:'suzuran',       name:'すずらん',            type:'bell',
    colors:[{n:'ホワイトセージ',h:1},{n:'ホワイトオリーブ',h:1}] },
  { id:'tulip',         name:'チューリップ',         type:'tulip',
    colors:[{n:'カーマインレッド',h:1},{n:'ローズピンク',h:1},{n:'ヒマワリ',h:1},{n:'キャロット',h:1},{n:'ダスティブルー',h:1},{n:'シトラス',h:1},{n:'ライラック',h:1},{n:'レッド',h:1}] },
  { id:'daisy',         name:'デイジー',             type:'daisy',
    colors:[{n:'ミルクホワイトセージ',h:1}] },
  { id:'camomile',      name:'カモミール',           type:'daisy',
    colors:[{n:'ホワイトセージ',h:1}] },
  { id:'oncidium',      name:'オンシジューム',        type:'orchid',
    colors:[{n:'イエロー',h:1},{n:'ライトイエロー',h:1}] },
  { id:'minisunflower', name:'ミニヒマワリ',          type:'sunflower',
    colors:[{n:'ヒマワリ',h:1},{n:'イエロー',h:1},{n:'クリームイエロー',h:1}] },
  { id:'minirose',      name:'ミニローズ',            type:'rose',
    colors:[{n:'アクア',h:1},{n:'アザミ',h:1},{n:'コーラルピンク',h:1},{n:'ピンク',h:1},{n:'キャロット',h:1},{n:'ダスティブルー',h:1}] },
  { id:'poppy',         name:'ポピー',               type:'poppy',
    colors:[{n:'コーラルピンク',h:1},{n:'カーマインレッド',h:1},{n:'アザミ',h:1}] },
  { id:'gradrose',      name:'グラデーションローズ',  type:'rose',
    colors:[{n:'Gイエロー',h:1},{n:'Gピンク',h:1},{n:'Gレッド',h:1}] },
  { id:'rose',          name:'ローズ',               type:'rose',
    colors:[{n:'レッド',h:1},{n:'ライトピンク',h:1},{n:'ライトブルー',h:1},{n:'クリームイエロー',h:1}] },
  { id:'damask',        name:'ダマスクローズ',         type:'rose',
    colors:[{n:'コーラルピンク',h:0},{n:'ライトブルー',h:0}] },
  { id:'snowpop',       name:'スノーポップ',           type:'poppy',
    colors:[{n:'ヒマワリ',h:1},{n:'ライトピンク',h:1},{n:'ミルクホワイト',h:1}] },
  { id:'leaf',          name:'リーフ',               type:'leaf',
    colors:[{n:'セージ',h:1},{n:'オリーブ',h:1}] },
  { id:'snowwillow',    name:'スノーウィロー',         type:'leaf',
    colors:[{n:'セージ',h:1},{n:'オリーブ',h:1}] },
  { id:'zinnia',        name:'ジニア',               type:'daisy',
    colors:[{n:'アザミ',h:1},{n:'ダスティブルー',h:1},{n:'カーマインレッド',h:1},{n:'クリームイエロー',h:1},{n:'ベビーピンク',h:1}] },
  { id:'kasumisou',     name:'カスミソウ',            type:'small',
    colors:[{n:'ホワイト',h:1}] },
  { id:'koflower',      name:'小花',                 type:'small',
    colors:[{n:'ベビーピンク',h:1},{n:'コーラルピンク',h:1},{n:'ローズピンク',h:1},{n:'ライトアクア',h:1},{n:'シトラス',h:1},{n:'クリームイエロー',h:1},{n:'マゼンタ',h:1},{n:'ベージュ',h:1},{n:'アザミ',h:1},{n:'カーマインレッド',h:1},{n:'オレンジ',h:1},{n:'ライトブルー',h:1},{n:'ダスティブルー',h:1}] },
  { id:'lavender',      name:'ラベンダー',            type:'lavender',
    colors:[{n:'アザミ',h:0},{n:'パープル',h:0}] },
];

let selected = [];
let currentFlower = null;
let currentColorIdx = 0;
let swapFirst = -1;

/* ---- SVG fallback shapes ---- */
function svgShape(type, hex, w, h) {
  const c = hex || '#e0c0c0';
  const cx = w/2, cy = h*0.42;
  switch(type) {
    case 'tulip':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <ellipse cx="${cx}" cy="${cy}" rx="${w*0.28}" ry="${h*0.32}" fill="${c}" opacity="0.9"/>
        <ellipse cx="${cx-w*0.15}" cy="${cy+h*0.05}" rx="${w*0.16}" ry="${h*0.25}" fill="${c}" opacity="0.7"/>
        <ellipse cx="${cx+w*0.15}" cy="${cy+h*0.05}" rx="${w*0.16}" ry="${h*0.25}" fill="${c}" opacity="0.7"/>
        <line x1="${cx}" y1="${cy+h*0.3}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
    case 'rose':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <circle cx="${cx}" cy="${cy}" r="${w*0.28}" fill="${c}" opacity="0.4"/>
        <circle cx="${cx}" cy="${cy-h*0.06}" r="${w*0.22}" fill="${c}" opacity="0.6"/>
        <circle cx="${cx}" cy="${cy-h*0.1}" r="${w*0.15}" fill="${c}" opacity="0.9"/>
        <circle cx="${cx}" cy="${cy-h*0.12}" r="${w*0.08}" fill="${c}"/>
        <line x1="${cx}" y1="${cy+h*0.2}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
    case 'sunflower':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        ${[0,45,90,135].map(a=>`<ellipse cx="${cx+Math.cos(a*Math.PI/180)*w*0.25}" cy="${cy+Math.sin(a*Math.PI/180)*w*0.25}" rx="${w*0.12}" ry="${w*0.18}" fill="${c}" opacity="0.8" transform="rotate(${a} ${cx+Math.cos(a*Math.PI/180)*w*0.25} ${cy+Math.sin(a*Math.PI/180)*w*0.25})"/>`).join('')}
        <circle cx="${cx}" cy="${cy}" r="${w*0.16}" fill="#a05820"/>
        <line x1="${cx}" y1="${cy+h*0.22}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
    case 'leaf':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <ellipse cx="${cx}" cy="${cy}" rx="${w*0.22}" ry="${h*0.38}" fill="${c}" opacity="0.85"/>
        <line x1="${cx}" y1="${cy-h*0.35}" x2="${cx}" y2="${h}" stroke="#4a7a3a" stroke-width="1.5"/>
      </svg>`;
    case 'lavender':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <ellipse cx="${cx}" cy="${cy-h*0.15}" rx="${w*0.08}" ry="${h*0.28}" fill="${c}" opacity="0.9"/>
        <ellipse cx="${cx-w*0.1}" cy="${cy-h*0.08}" rx="${w*0.07}" ry="${h*0.22}" fill="${c}" opacity="0.7"/>
        <ellipse cx="${cx+w*0.1}" cy="${cy-h*0.08}" rx="${w*0.07}" ry="${h*0.22}" fill="${c}" opacity="0.7"/>
        <line x1="${cx}" y1="${cy+h*0.1}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
    case 'small':
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        ${[-1,0,1].map(dx=>[-1,0,1].map(dy=>`<circle cx="${cx+dx*w*0.14}" cy="${cy+dy*h*0.14}" r="${w*0.08}" fill="${c}" opacity="0.8"/>`).join('')).join('')}
        <line x1="${cx}" y1="${cy+h*0.22}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
    default: /* daisy, poppy, bell, orchid */
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        ${[0,60,120,180,240,300].map(a=>`<ellipse cx="${cx+Math.cos(a*Math.PI/180)*w*0.22}" cy="${cy+Math.sin(a*Math.PI/180)*h*0.2}" rx="${w*0.12}" ry="${h*0.16}" fill="${c}" opacity="0.8"/>`).join('')}
        <circle cx="${cx}" cy="${cy}" r="${w*0.1}" fill="#ffd700" opacity="0.95"/>
        <line x1="${cx}" y1="${cy+h*0.18}" x2="${cx}" y2="${h}" stroke="#6a9e5a" stroke-width="2"/>
      </svg>`;
  }
}

/* ---- Render flower grid ---- */
function renderGrid() {
  const grid = document.getElementById('flower-grid');
  grid.innerHTML = FLOWERS.map(f => {
    const fc = f.colors[0];
    const count = selected.filter(s => s.fid === f.id).length;
    const thumb = fc.h
      ? `<div class="img-wrap"><img src="${u(f.name, fc.n)}" alt="${f.name}"></div>`
      : svgShape(f.type, HEX[fc.n], 56, 72).replace('<svg ', '<svg class="f-svg" ');
    return `<div class="flower-card${count?` selected`:''}" data-fid="${f.id}" onclick="openSheet('${f.id}')">
      ${count ? `<span class="count-badge">${count}</span>` : ''}
      ${thumb}
      <div class="f-name">${f.name}</div>
      <div class="color-dots">${f.colors.slice(0,6).map(c=>`<span class="cdot" style="background:${HEX[c.n]||'#ccc'}"></span>`).join('')}</div>
    </div>`;
  }).join('');
}

/* ---- Bottom sheet ---- */
function openSheet(fid) {
  currentFlower = FLOWERS.find(f => f.id === fid);
  currentColorIdx = 0;
  document.getElementById('sheet-flower-name').textContent = currentFlower.name;
  renderColorGrid();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}

function renderColorGrid() {
  document.getElementById('color-grid').innerHTML = currentFlower.colors.map((c, i) => {
    const thumb = c.h
      ? `<div class="img-wrap"><img src="${u(currentFlower.name, c.n)}" alt="${c.n}"></div>`
      : svgShape(currentFlower.type, HEX[c.n], 56, 76).replace('<svg ', '<svg class="c-svg" ');
    return `<div class="color-option${i===0?' active':''}" onclick="pickColor(${i})">${thumb}<div class="c-name">${c.n}</div></div>`;
  }).join('');
}

function pickColor(i) {
  currentColorIdx = i;
  document.querySelectorAll('.color-option').forEach((el,j) => el.classList.toggle('active', j===i));
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

function addFlower() {
  if (!currentFlower) return;
  const c = currentFlower.colors[currentColorIdx];
  selected.push({
    fid: currentFlower.id,
    fname: currentFlower.name,
    ftype: currentFlower.type,
    cname: c.n,
    chex: HEX[c.n] || '#eee',
    imgUrl: c.h ? u(currentFlower.name, c.n) : null,
  });
  closeSheet();
  refresh();
}

function removeItem(i) {
  selected.splice(i, 1);
  refresh();
}

function clearAll() {
  selected = [];
  refresh();
}

function refresh() {
  renderBouquet();
  renderBar();
  renderGrid();
}

/* ---- Selected bar ---- */
function renderBar() {
  const bar = document.getElementById('selected-bar');
  if (!selected.length) {
    bar.innerHTML = `<span class="empty-bar">No flowers selected yet</span>`;
    return;
  }
  bar.innerHTML = selected.map((s,i) => `
    <div class="sel-chip">
      <span class="dot" style="background:${s.chex}"></span>
      <span>${s.fname}</span>
      <span style="color:#b09080;font-size:0.6rem">${s.cname}</span>
      <span class="rm" onclick="removeItem(${i})">✕</span>
    </div>`).join('') +
    `<button class="clear-btn" onclick="clearAll()">Clear</button>`;
}

/* ---- Bouquet SVG ---- */
const CONFIGS = {
  1:[{fx:.5,fy:.3}],
  2:[{fx:.35,fy:.32},{fx:.65,fy:.3}],
  3:[{fx:.22,fy:.36},{fx:.5,fy:.26},{fx:.78,fy:.36}],
  4:[{fx:.18,fy:.4},{fx:.42,fy:.28},{fx:.62,fy:.28},{fx:.82,fy:.4}],
  5:[{fx:.12,fy:.44},{fx:.32,fy:.3},{fx:.52,fy:.24},{fx:.72,fy:.3},{fx:.88,fy:.44}],
};
function getPositions(n) {
  if (CONFIGS[n]) return CONFIGS[n];
  const pos = [];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    pos.push({ fx: 0.04 + t * 0.92, fy: 0.48 - 0.24 * Math.sin(Math.PI * t) });
  }
  return pos;
}

function renderBouquet() {
  const svg = document.getElementById('bouquet-svg');
  const emptyMsg = document.getElementById('empty-msg');
  if (!selected.length) { svg.innerHTML = ''; emptyMsg.style.display = 'flex'; return; }
  emptyMsg.style.display = 'none';

  const W=300, H=460, n=selected.length;
  const bx = W/2;
  const fw = 130;
  const fh = 390;

  // ひな壇型2層ファン: 後列=外側広め, 前列=内側中心寄り (何本でも対応)
  function drawItem(s, angle, ay, sidx) {
    if (!s) return '';
    const anchorY = ay !== undefined ? ay : H;
    if (s.imgUrl) {
      const isSwapSel = sidx !== undefined && sidx === swapFirst;
      const dimmed    = swapFirst >= 0 && !isSwapSel;
      const filt = isSwapSel
        ? 'filter:drop-shadow(0 0 12px rgba(42,157,150,1)) brightness(1.08)'
        : 'filter:drop-shadow(0 3px 6px rgba(0,0,0,0.15))';
      const opac = dimmed ? ';opacity:0.45' : '';
      return '<image href="' + s.imgUrl + '" x="' + (bx-5000) + '" y="' + (anchorY-fh) + '" width="10000" height="' + fh + '" data-sidx="' + sidx + '" transform="rotate(' + angle.toFixed(1) + ' ' + bx + ' ' + anchorY + ')" preserveAspectRatio="xMidYMin meet" style="' + filt + opac + '"/>';
    } else {
      const rad = angle * Math.PI / 180;
      return flowerElem(s.ftype, s.chex, bx + Math.sin(rad)*fh*0.55, anchorY - Math.cos(rad)*fh*0.55);
    }
  }

  function spread(count, maxA) {
    if (count <= 0) return [];
    if (count === 1) return [0];
    return Array.from({length: count}, (_, i) => -maxA + i * (2 * maxA / (count - 1)));
  }

  // スノーポップ・リーフ・スノーウィロー・オンシジュームは必ず後列
  const BG_IDS = new Set(['snowpop', 'leaf', 'snowwillow', 'oncidium']);
  const bgItems = selected.filter(s => BG_IDS.has(s.fid));
  const fgItems = selected.filter(s => !BG_IDS.has(s.fid));

  // 1〜3本は全て後列。4本以降は前後2列に分割
  const normalFrontN = n <= 3 ? 0 : Math.floor(n / 2);
  const normalBackN  = n - normalFrontN;

  // bg花は後列を優先。必要なら後列を拡大
  const actualBackN  = Math.max(normalBackN, bgItems.length);
  const actualFrontN = n - actualBackN;
  const backFgCount  = actualBackN - bgItems.length;
  const backItems    = bgItems.concat(fgItems.slice(0, backFgCount));
  const frontItems   = fgItems.slice(backFgCount);

  const backMax  = Math.min(34, 7 * actualBackN);
  const frontMax = Math.min(16, 8 * Math.max(0, actualFrontN - 1));

  const backA  = spread(actualBackN,  backMax);
  const frontA = spread(actualFrontN, frontMax);

  let out = '';
  // 後列: 外側→内側の順（後列の中で内側が最前面）
  backA.map((_,i) => i).sort((a,b) => Math.abs(backA[b]) - Math.abs(backA[a]))
    .forEach(i => { out += drawItem(backItems[i], backA[i], undefined, selected.indexOf(backItems[i])); });
  // 前列: 外側→内側（中央が最前面＝最後に描画）
  frontA.map((_,i) => i).sort((a,b) => Math.abs(frontA[b]) - Math.abs(frontA[a]))
    .forEach(i => { out += drawItem(frontItems[i], frontA[i], H + 120, selected.indexOf(frontItems[i])); });

  svg.innerHTML = out;
}

function flowerElem(type, hex, cx, cy) {
  const c = hex || '#e0c0c0';
  switch(type) {
    case 'rose':
      return `<circle cx="${cx}" cy="${cy}" r="22" fill="${c}" opacity="0.35"/>
        <circle cx="${cx}" cy="${cy-6}" r="17" fill="${c}" opacity="0.6"/>
        <circle cx="${cx}" cy="${cy-10}" r="11" fill="${c}" opacity="0.85"/>
        <circle cx="${cx}" cy="${cy-12}" r="6" fill="${c}"/>`;
    case 'lavender':
      return `<ellipse cx="${cx}" cy="${cy-18}" rx="7" ry="24" fill="${c}" opacity="0.9"/>
        <ellipse cx="${cx-10}" cy="${cy-10}" rx="6" ry="18" fill="${c}" opacity="0.7"/>
        <ellipse cx="${cx+10}" cy="${cy-10}" rx="6" ry="18" fill="${c}" opacity="0.7"/>`;
    default:
      return [0,60,120,180,240,300].map(a =>
        `<ellipse cx="${cx+Math.cos(a*Math.PI/180)*18}" cy="${cy+Math.sin(a*Math.PI/180)*16}"
          rx="10" ry="14" fill="${c}" opacity="0.8"
          transform="rotate(${a} ${cx+Math.cos(a*Math.PI/180)*18} ${cy+Math.sin(a*Math.PI/180)*16})"/>`
      ).join('') + `<circle cx="${cx}" cy="${cy}" r="8" fill="#ffd700" opacity="0.95"/>`;
  }
}

/* ---- Pinch zoom + pan for bouquet area ---- */
(function() {
  const SVG_W = 300, SVG_H = 360;
  const wrap = document.querySelector('.bouquet-wrap');
  const svg  = document.getElementById('bouquet-svg');

  let scale = 1, lastScale = 1;
  let vx = 0, vy = 0, savedVx = 0, savedVy = 0;
  let startDist = 0;
  let panStart = null;
  let lastTap = 0;

  function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

  function applyView() {
    const vw = SVG_W / scale, vh = SVG_H / scale;
    const pad = SVG_W * 0.5;
    vx = clamp(vx, -pad, SVG_W + pad - vw);
    vy = clamp(vy, -pad, SVG_H + pad - vh);
    svg.setAttribute('viewBox', `${vx} ${vy} ${vw} ${vh}`);
  }

  function resetView() {
    scale = 1; lastScale = 1;
    vx = 0; vy = 0; savedVx = 0; savedVy = 0;
    svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  }

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      startDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      savedVx = vx; savedVy = vy;
      panStart = null;
    } else if (e.touches.length === 1) {
      panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, vx, vy };
      const now = Date.now();
      if (now - lastTap < 300) resetView();
      lastTap = now;
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      scale = clamp(lastScale * (dist / startDist), 0.4, 5);
      vx = savedVx; vy = savedVy;
      applyView();
    } else if (e.touches.length === 1 && panStart) {
      const rect = wrap.getBoundingClientRect();
      vx = panStart.vx - (e.touches[0].clientX - panStart.x) / rect.width  * (SVG_W / scale);
      vy = panStart.vy - (e.touches[0].clientY - panStart.y) / rect.height * (SVG_H / scale);
      applyView();
    }
  }, { passive: false });

  wrap.addEventListener('touchend', e => {
    lastScale = scale;
    savedVx = vx; savedVy = vy;
    if (e.touches.length === 0) panStart = null;
  }, { passive: true });
})();

/* ---- Long-press swap ---- */
(function() {
  const svg = document.getElementById('bouquet-svg');
  let pressTimer = null;
  let swapActivatedThisTouch = false;

  svg.addEventListener('touchstart', e => {
    swapActivatedThisTouch = false;
    const el = e.target;
    if (!el.hasAttribute('data-sidx')) return;
    pressTimer = setTimeout(() => {
      swapFirst = parseInt(el.getAttribute('data-sidx'));
      swapActivatedThisTouch = true;
      renderBouquet();
    }, 500);
  }, {passive: true});

  svg.addEventListener('touchmove', () => {
    clearTimeout(pressTimer); pressTimer = null;
  }, {passive: true});

  svg.addEventListener('touchend', e => {
    clearTimeout(pressTimer); pressTimer = null;
    if (swapActivatedThisTouch) { swapActivatedThisTouch = false; return; }
    if (swapFirst < 0) return;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.hasAttribute('data-sidx')) {
      const idx = parseInt(el.getAttribute('data-sidx'));
      if (idx !== swapFirst) {
        const tmp = selected[swapFirst];
        selected[swapFirst] = selected[idx];
        selected[idx] = tmp;
      }
    }
    swapFirst = -1;
    refresh();
  }, {passive: true});
})();

// Init
refresh();
</script>
